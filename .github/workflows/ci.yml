name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  # Only needed for Prisma Client generation / any DB-touching unit tests added
  # later. Not a real secret — matches the docker-compose postgres service.
  DATABASE_URL: "postgresql://soccerdads:soccerdads@localhost:5432/soccerdads?schema=public"

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Start postgres (for tests that need a real database)
        run: docker compose up -d postgres

      - name: Wait for postgres to accept connections
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U soccerdads && exit 0
            sleep 1
          done
          echo "postgres did not become ready in time" >&2
          exit 1

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  e2e:
    name: End-to-end tests
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start postgres
        run: docker compose up -d postgres

      - name: Wait for postgres to accept connections
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T postgres pg_isready -U soccerdads && exit 0
            sleep 1
          done
          echo "postgres did not become ready in time" >&2
          exit 1

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
